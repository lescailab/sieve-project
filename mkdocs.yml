site_name: SIEVE Documentation
site_description: User guide and technical reference for SIEVE (Sparse Interpretable Exome Variant Explainer)
site_author: Lesca Lab
repo_url: https://github.com/lescailab/sieve-project
repo_name: lescailab/sieve-project
edit_uri: edit/main/documentation/
docs_dir: documentation
site_dir: site

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Installation: installation.md
  - Complete Workflow: complete-workflow.md
  - Detailed Usage: detailed-usage.md
  - Command Reference: command-reference.md
  - Validation: validation.md
  - Interpreting Results: interpreting-results.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
  - Citation: citation.md
  - Support: support.md
  - License: license.md
  - Appendices:
      - Model Architecture Details: appendices/model-architecture.md
      - Experimental Protocol: appendices/experimental-protocol.md
      - Method References: appendices/method-references.md

plugins:
  - search

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  font:
    text: Inter
  features:
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - navigation.footer
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.share
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      title: On this page
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
