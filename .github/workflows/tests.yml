name: Unit Tests

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  test-attention-analysis:
    name: Attention Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/test_attention_analysis.py -v --no-header -o "addopts="

  test-chunked-sieve:
