{% set version = "1.2.0" %}

package:
  name: sieve
  version: {{ version }}

source:
  path: ..

build:
  number: 1
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"

requirements:
  host:
    - python >=3.10,<3.13
    - pip
    - setuptools >=61.0
    - wheel
  run:
    - python >=3.10,<3.13
    - numpy >=2.0,<3.0
    - pandas >=2.0.0
    - scipy >=1.10.0
    - pytorch >=2.0.0
    - pytorch-cuda >=11.8  # [linux and x86_64]
    - captum >=0.6.0,<1.0
    - cyvcf2 >=0.30.0
    - pysam >=0.21.0
    - scikit-learn >=1.3.0
    - shap >=0.42.0,<0.50
    - pyyaml >=6.0
    - tqdm >=4.65.0
    - matplotlib >=3.7.0
    - seaborn >=0.12.0
    - threadpoolctl >=3.0.0
    - statsmodels >=0.14.0
    - pyarrow >=12.0.0

test:
  imports:
    - src
    - scripts
  commands:
    - sieve-preprocess --help
    - sieve-infer-sex --help
    - sieve-check-sex-balance --help
    - sieve-train --help
    - sieve-explain --help
    - sieve-create-null-baseline --help
    - sieve-run-null-baseline --help
    - sieve-compare-attributions --help
    - sieve-correct-chrx-bias --help
    - sieve-validate-discoveries --help
    - sieve-validate-epistasis --help
    - sieve-compare-ablation-rankings --help
    - sieve-ablation-compare --help
    - sieve-plot-ablation-comparison --help
    - sieve-audit-cooccurrence --help
    - sieve-epistasis-power-analysis --help
    - sieve-aggregate-gene-interactions --help
    - sieve-generate-gene-list --help
    - sieve-extract-burden --help
    - sieve-test-burden-enrichment --help
    - sieve-bootstrap-null-calibration --help
    - sieve-validate-nonlinear-classifier --help
    - sieve-summarize-classifier-comparison --help
    - sieve-plot-validation-burden --help

about:
  home: https://github.com/lescailab/sieve-project
  summary: Sparse Interpretable Exome Variant Explainer for case-control variant discovery.
  description: |
    SIEVE is a deep learning framework for variant discovery in exome
    case-control cohorts. This conda recipe installs core dependencies and
    exposes end-to-end CLI commands for preprocessing, training, explainability,
    null baseline calibration, biological validation, ablation comparison, and
    epistasis analysis workflows.
  license: MIT
  license_file: documentation/license.md
  dev_url: https://github.com/lescailab/sieve-project

extra:
  recipe-maintainers:
    - lescai
